services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: stock
      POSTGRES_DB: stock_ai
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  backend:
    build: ./backend
    env_file: ./backend/.env.example
    ports: ["8000:8000"]
    depends_on: [postgres, redis]
  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000/api/v1
    ports: ["3000:3000"]
    depends_on: [backend]
volumes:
  postgres_data:
